name: Build iOS Telemetry Bridge

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  build:
    name: Compile iOS IPA (Cloud build)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.6' # Matches your Flutter toolchain compile target

      - name: Install CocoaPods Dependencies
        run: |
          cd src/telemetry_bridge
          flutter pub get
          cd ios
          pod install

      - name: Compile Unsigned iOS Package
        run: |
          cd src/telemetry_bridge
          flutter build ios --no-codesign --release

      - name: Package IPA Bundle
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r src/telemetry_bridge/build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r ../../../telemetry_bridge_ios.ipa Payload
          cd ../../..

      - name: Upload iOS IPA Artifact
        uses: actions/artifacts/upload@v4
        with:
          name: telemetry-bridge-ios-package
          path: telemetry_bridge_ios.ipa
          retention-days: 7
